<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Expense Tracker</h1>

    <!-- Input Form -->
    <div class="form">
      <input type="text" id="title" placeholder="Enter title (e.g. Pizza)">
      <input type="number" id="amount" placeholder="Enter amount">
      
      <select id="category">
        <option value="">Select Category</option>
        <option value="Food">Food</option>
        <option value="Travel">Travel</option>
        <option value="Shopping">Shopping</option>
      </select>

      <button id="add-btn">Add Expense</button>
    </div>

    <!-- Expense List -->
    <div class="expense-list">
      <h2>Expenses</h2>
      <ul id="expense-items">

      </ul>
    </div>

    <!-- Summary -->
    <div class="summary">
      <h2>Summary</h2>
      <p>Total Spent: <span id="total-amount"></span></p>
      <p>Food Expense: <span id="food-expense"></span></p>
      <p>Highest Category: <span id="highest-category"></span></p>
    </div>

  </div>

</body>
<script src="script.js" defer></script>
</html>
