<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>

  <div class="container">
    <h1>Weather Dashboard</h1>

    <div class="search-box">
      <input type="text" placeholder="Enter city name..." id="input_box">
      <button id="search_button">Search</button>
    </div>

    <div class="weather-card">
      <h2 id="city_name">Hyderabad</h2>
      <p class="date" id="date_day">Thursday, 19 March</p>

      <div class="weather-info">
        <div class="temp" id="temp_data">32°C</div>
        <div class="details">
          <p id="cloudy">🌤️ Partly Cloudy</p>
          <p id="humidity_data">Humidity: 60%</p>
          <p id="wind_data">Wind: 12 km/h</p>
        </div>
      </div>
    </div>

   

  </div>

</body>
<script src="script.js" defer></script>
</html>
