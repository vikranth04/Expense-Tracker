<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.ico">
</head>
<body>
<div class="container">
      <h2>To-Do List</h2>
      <div class="input-box">
      <input type="text" placeholder="Add a task..." id="input-box">
      <button id="input-button">Add</button>
</div>
    <ul>
      <li>
        <span id="update-task">Sample Task</span>
        <div class="delete" id="delete-task">X</div>
      </li>
    </ul>
</div>
</body>
  <script src="script.js" defer></script>
</html>
